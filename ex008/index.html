<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav {
            background-color: black;
            height: 50px;
        }
        a {
            text-decoration: none;
            color: white;
            height: 50px;
            width: 100px;
            display: inline-block;
            text-align: center;
            line-height: 50px; /* Mesma altura do <a> */            
        }
        a:hover {
            background-color: white;
            color: black;
        }
        @media (max-width: 375px) {
            nav {
                display: flex;
                flex-direction: column;
                height: auto;
            }
            a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
    </nav>
</body>
</html>
